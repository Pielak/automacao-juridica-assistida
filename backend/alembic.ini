# Configuração do Alembic para migrations do PostgreSQL
# Projeto: Automação Jurídica Assistida
# Documentação: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]

# Caminho para o diretório de migrations
script_location = alembic

# Template usado para gerar novos arquivos de migration
# file_template = %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Fuso horário para geração de timestamps nos nomes de arquivos de migration
timezone = America/Sao_Paulo

# Truncar slug do nome do arquivo de migration em N caracteres
truncate_slug_length = 40

# Definir como 'true' para executar o ambiente de migration mesmo
# se nenhuma migration nova for detectada
# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = false

# Definir como 'true' para permitir arquivos .pyc e .pyo no diretório de versões
sourceless = false

# Separador de versão; utilizado para permitir que Alembic reconheça
# múltiplas bases (heads) em cenários de branch
version_path_separator = os

# Prefixo de saída para o comando 'alembic output'
# output_encoding = utf-8

# URL de conexão com o banco de dados PostgreSQL
# IMPORTANTE: Em produção, esta URL é sobrescrita programaticamente
# pelo env.py usando variáveis de ambiente (DATABASE_URL).
# O valor abaixo serve apenas como fallback para desenvolvimento local.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/automacao_juridica

# Pool de conexões — configurações para o SQLAlchemy engine
# Estas configurações são aplicadas programaticamente no env.py
# sqlalchemy.pool_size = 5
# sqlalchemy.max_overflow = 10
# sqlalchemy.pool_timeout = 30
# sqlalchemy.pool_recycle = 1800

[post_write_hooks]
# Hooks executados após a geração de novos arquivos de migration.
# Formata automaticamente o código gerado com ruff (linter/formatter do projeto).
hooks = ruff_format

ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

# Configuração de logging para o Alembic e SQLAlchemy
# Níveis disponíveis: DEBUG, INFO, WARN, ERROR, CRITICAL

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
# Definir como INFO para log de instruções SQL emitidas pelo engine
# Definir como DEBUG para log detalhado incluindo resultados de queries
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
# Nível de log para operações do Alembic (migrations, autogenerate, etc.)
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
