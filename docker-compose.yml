# ==============================================================================
# Automação Jurídica Assistida — Docker Compose
# ==============================================================================
# Orquestração local: backend (FastAPI), frontend (React/Vite), PostgreSQL,
# Redis, Nginx (proxy reverso e arquivos estáticos).
#
# Uso:
#   cp .env.example .env   # Preencha as variáveis
#   docker compose up -d   # Sobe todos os serviços
#   docker compose logs -f # Acompanha logs
# ==============================================================================

version: "3.9"

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL — Banco de dados relacional principal
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: aja-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aja_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      POSTGRES_DB: ${POSTGRES_DB:-aja_db}
      # Configurações de locale para suporte correto a PT-BR
      LANG: pt_BR.UTF-8
      LC_ALL: pt_BR.UTF-8
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialização opcional (extensões, schemas, etc.)
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aja_user} -d ${POSTGRES_DB:-aja_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aja-network

  # ----------------------------------------------------------------------------
  # Redis — Cache, sessões, broker do Celery e rate limiting
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: aja-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aja-network

  # ----------------------------------------------------------------------------
  # Backend — FastAPI (API REST + documentação OpenAPI)
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.11"
    container_name: aja-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Sobrescreve hosts para apontar aos containers da rede Docker
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aja_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aja_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/${REDIS_DB:-0}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/${CELERY_BROKER_DB:-1}
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/${CELERY_RESULT_DB:-2}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Garante que o Python não faça buffer nos logs
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Bind mount para hot-reload em desenvolvimento
      - ./backend/src:/app/src:ro
      # Volume para uploads temporários
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aja-network

  # ----------------------------------------------------------------------------
  # Celery Worker — Processamento assíncrono de tarefas
  # (análise de documentos, integração Anthropic, DataJud, etc.)
  # ----------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aja-celery-worker
    restart: unless-stopped
    # TODO: Ajustar o caminho do módulo Celery conforme estrutura final do backend
    command: celery -A src.infrastructure.celery_app worker --loglevel=${LOG_LEVEL:-info} --concurrency=${CELERY_CONCURRENCY:-2} -Q default,analysis,documents
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aja_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aja_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/${REDIS_DB:-0}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/${CELERY_BROKER_DB:-1}
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/${CELERY_RESULT_DB:-2}
      APP_ENV: ${APP_ENV:-development}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./backend/src:/app/src:ro
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - aja-network

  # ----------------------------------------------------------------------------
  # Celery Beat — Agendador de tarefas periódicas
  # (limpeza de sessões expiradas, sincronização DataJud, etc.)
  # ----------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aja-celery-beat
    restart: unless-stopped
    # TODO: Ajustar o caminho do módulo Celery conforme estrutura final do backend
    command: celery -A src.infrastructure.celery_app beat --loglevel=${LOG_LEVEL:-info} --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/${CELERY_BROKER_DB:-1}
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/${CELERY_RESULT_DB:-2}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ./backend/src:/app/src:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aja-network

  # ----------------------------------------------------------------------------
  # Frontend — React SPA (Vite dev server em desenvolvimento)
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_BUILD_TARGET:-development}
    container_name: aja-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # URL da API para o Vite proxy (desenvolvimento)
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
      VITE_APP_TITLE: "Automação Jurídica Assistida"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      # Bind mount para hot-reload (HMR) em desenvolvimento
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      # Evita sobrescrever node_modules do container
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - aja-network

  # ----------------------------------------------------------------------------
  # Nginx — Proxy reverso, TLS termination, arquivos estáticos
  # ----------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: aja-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      # Configuração do Nginx
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      # Certificados TLS (auto-assinados para dev, Let's Encrypt para prod)
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      # Logs do Nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - aja-network

# ==============================================================================
# Volumes persistentes
# ==============================================================================
volumes:
  # Dados do PostgreSQL
  postgres_data:
    driver: local
    name: aja-postgres-data

  # Dados do Redis (AOF para persistência)
  redis_data:
    driver: local
    name: aja-redis-data

  # Uploads de documentos jurídicos
  upload_data:
    driver: local
    name: aja-upload-data

  # Logs do Nginx
  nginx_logs:
    driver: local
    name: aja-nginx-logs

# ==============================================================================
# Rede interna dos serviços
# ==============================================================================
networks:
  aja-network:
    driver: bridge
    name: aja-network
    ipam:
      config:
        - subnet: 172.28.0.0/16
