# =============================================================================
# Configuração Nginx — Automação Jurídica Assistida
# Proxy reverso para API FastAPI, servidor de arquivos estáticos (SPA React),
# headers de segurança (CSP, HSTS, X-Frame-Options, etc.)
# =============================================================================

# Número de workers — ajustar conforme CPUs disponíveis no servidor
worker_processes auto;

# Limite de conexões simultâneas por worker
events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # -------------------------------------------------------------------------
    # Configurações gerais
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Formato de log estruturado com request ID para correlação
    log_format main_json escape=json
        '{'
            '"time": "$time_iso8601", '
            '"remote_addr": "$remote_addr", '
            '"request_id": "$request_id", '
            '"method": "$request_method", '
            '"uri": "$request_uri", '
            '"status": $status, '
            '"body_bytes_sent": $body_bytes_sent, '
            '"request_time": $request_time, '
            '"upstream_response_time": "$upstream_response_time", '
            '"http_user_agent": "$http_user_agent", '
            '"http_referer": "$http_referer"'
        '}';

    access_log /var/log/nginx/access.log main_json;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Limitar tamanho do corpo da requisição (upload de documentos jurídicos)
    # Ajustar conforme necessidade — 50MB é razoável para PDFs jurídicos
    client_max_body_size 50m;

    # Ocultar versão do Nginx nos headers de resposta
    server_tokens off;

    # Compressão gzip para assets estáticos e respostas da API
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # -------------------------------------------------------------------------
    # Rate limiting — proteção contra abuso
    # Zona compartilhada para limitar requisições por IP
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/s;

    # -------------------------------------------------------------------------
    # Upstream — backend FastAPI
    # -------------------------------------------------------------------------
    upstream fastapi_backend {
        # TODO: Ajustar host:porta conforme ambiente (Docker Compose usa nome do serviço)
        server backend:8000;

        # Keepalive para reutilizar conexões com o backend
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # Mapa para Content-Security-Policy dinâmico (nonce não implementado aqui;
    # usar meta tag no HTML ou gerar via backend se necessário)
    # -------------------------------------------------------------------------
    map $uri $csp_header {
        default "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests";
    }

    # -------------------------------------------------------------------------
    # Servidor principal — HTTPS (produção)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Em produção, redirecionar todo tráfego HTTP para HTTPS
        # TODO: Descomentar quando certificado TLS estiver configurado
        # return 301 https://$host$request_uri;

        # Em desenvolvimento, servir diretamente na porta 80
        # TODO: Remover este bloco em produção e usar o server HTTPS abaixo

        # -----------------------------------------------------------------
        # Headers de segurança globais
        # -----------------------------------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy $csp_header always;
        # TODO: Habilitar HSTS quando TLS estiver ativo
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Propagar request ID para correlação de logs
        add_header X-Request-ID $request_id always;

        # -----------------------------------------------------------------
        # Proxy reverso — API FastAPI (/api)
        # -----------------------------------------------------------------
        location /api/ {
            # Rate limiting geral para API
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;

            # Headers de proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Timeouts para operações de IA que podem demorar
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # Não armazenar em cache respostas da API
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # -----------------------------------------------------------------
        # Rate limiting mais restritivo para endpoints de autenticação
        # -----------------------------------------------------------------
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # -----------------------------------------------------------------
        # Rate limiting para upload de documentos
        # -----------------------------------------------------------------
        location /api/v1/documents/upload {
            limit_req zone=upload_limit burst=2 nodelay;
            limit_req_status 429;

            # Tamanho máximo para upload de documentos jurídicos
            client_max_body_size 50m;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Timeout maior para uploads grandes
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # -----------------------------------------------------------------
        # Documentação OpenAPI (Swagger/ReDoc) — acessível apenas em dev
        # TODO: Em produção, proteger com autenticação ou desabilitar
        # -----------------------------------------------------------------
        location /docs {
            proxy_pass http://fastapi_backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /redoc {
            proxy_pass http://fastapi_backend/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass http://fastapi_backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------------------
        # Health check — endpoint para monitoramento
        # -----------------------------------------------------------------
        location /health {
            proxy_pass http://fastapi_backend/api/v1/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Sem rate limiting para health checks
            access_log off;
        }

        # -----------------------------------------------------------------
        # Assets estáticos com cache agressivo (Vite gera hashes nos nomes)
        # -----------------------------------------------------------------
        location /assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;

            # Compressão para assets
            gzip_static on;
        }

        # -----------------------------------------------------------------
        # Favicon e manifest
        # -----------------------------------------------------------------
        location = /favicon.ico {
            root /usr/share/nginx/html;
            expires 30d;
            access_log off;
            log_not_found off;
        }

        location = /manifest.json {
            root /usr/share/nginx/html;
            expires 1d;
            add_header Cache-Control "public";
        }

        # -----------------------------------------------------------------
        # SPA React — fallback para index.html (client-side routing)
        # Todas as rotas não reconhecidas são servidas pelo React Router
        # -----------------------------------------------------------------
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache curto para index.html (permite atualizações rápidas)
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
                # Re-adicionar headers de segurança (add_header em bloco aninhado
                # sobrescreve os do bloco pai)
                add_header X-Frame-Options "DENY" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-XSS-Protection "1; mode=block" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
                add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
                add_header Content-Security-Policy $csp_header always;
            }
        }

        # -----------------------------------------------------------------
        # Bloquear acesso a arquivos ocultos e sensíveis
        # -----------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.(env|git|gitignore|dockerignore)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # -----------------------------------------------------------------
        # Página de erro customizada para rate limiting
        # -----------------------------------------------------------------
        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"detail": "Limite de requisições excedido. Tente novamente em alguns segundos."}';
        }

        # Páginas de erro genéricas
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 502 '{"detail": "Serviço temporariamente indisponível. Tente novamente em instantes."}';
        }
    }

    # -------------------------------------------------------------------------
    # Servidor HTTPS (produção) — descomentar quando TLS estiver configurado
    # -------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name seu-dominio.com.br;
    #
    #     # Certificados TLS
    #     # TODO: Configurar paths dos certificados (Let's Encrypt ou certificado corporativo)
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     # Configuração TLS segura
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # OCSP Stapling
    #     ssl_stapling on;
    #     ssl_stapling_verify on;
    #     resolver 8.8.8.8 8.8.4.4 valid=300s;
    #     resolver_timeout 5s;
    #
    #     # Session tickets
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #
    #     # ... (copiar locations do bloco HTTP acima)
    # }
}
