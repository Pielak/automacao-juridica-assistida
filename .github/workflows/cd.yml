  # ============================================================
  # Etapa 8 — Criar release tag no repositório
  # ============================================================
  create-release:
    name: "Criar Release Tag"
    runs-on: ubuntu-latest
    needs: [prepare, deploy-production]
    if: success() && needs.prepare.outputs.environment == 'production'
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar tag de release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ needs.prepare.outputs.version }}"
          git tag -a "${TAG}" -m "Release ${TAG} — deploy automático em produção"
          git push origin "${TAG}"
          echo "Tag criada: ${TAG}"

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: "Release v${{ needs.prepare.outputs.version }}"
          body: |
            ## Automação Jurídica Assistida — Release v${{ needs.prepare.outputs.version }}

            **Deploy automático em produção**

            - Commit: ${{ github.sha }}
            - Autor: ${{ github.actor }}
            - Data: ${{ github.event.head_commit.timestamp }}

            ### Imagens Docker
            - Backend: `${{ env.BACKEND_IMAGE }}:${{ needs.prepare.outputs.version }}`
            - Frontend: `${{ env.FRONTEND_IMAGE }}:${{ needs.prepare.outputs.version }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
