# Pipeline de Entrega Contínua — Automação Jurídica Assistida
# Build de imagens Docker, push para registry e deploy em staging/produção
#
# Fluxo:
#   1. Build e push de imagens Docker (backend + frontend)
#   2. Deploy automático em staging (branch develop)
#   3. Deploy em produção com aprovação manual (branch main)

name: CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo para deploy manual"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  # Registry — ajustar conforme provedor (GHCR, ECR, ACR, etc.)
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/automacao-juridica-assistida
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/automacao-juridica-assistida/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/automacao-juridica-assistida/frontend

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # Não cancelar deploys em andamento

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ============================================================
  # Etapa 1 — Determinar ambiente e versão
  # ============================================================
  prepare:
    name: "Preparar metadados de deploy"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.set-version.outputs.version }}
      short_sha: ${{ steps.set-version.outputs.short_sha }}
      should_deploy: ${{ steps.set-env.outputs.should_deploy }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determinar ambiente alvo
        id: set-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Gerar versão semântica
        id: set-version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Formato: YYYY.MM.DD-<short_sha> para rastreabilidade
          VERSION=$(date +'%Y.%m.%d')-${SHORT_SHA}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Versão gerada: ${VERSION}"

  # ============================================================
  # Etapa 2 — Executar CI antes do deploy (reutiliza pipeline CI)
  # ============================================================
  ci-check:
    name: "Verificação CI pré-deploy"
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ============================================================
  # Etapa 3 — Build e Push da imagem Docker do Backend
  # ============================================================
  build-backend:
    name: "Build Backend Docker Image"
    runs-on: ubuntu-latest
    needs: [prepare, ci-check]
    if: needs.prepare.outputs.should_deploy == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados Docker (backend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=${{ needs.prepare.outputs.environment }}-latest
            type=sha,prefix=sha-

      - name: Build e push da imagem backend
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            APP_VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ needs.prepare.outputs.short_sha }}
          # Segurança: não incluir secrets no build
          # Usar multi-stage build no Dockerfile para imagem mínima

      - name: Verificar vulnerabilidades na imagem (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ needs.prepare.outputs.version }}
          format: "sarif"
          output: "trivy-backend-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"  # Falhar em vulnerabilidades críticas
        continue-on-error: false

      - name: Upload resultado Trivy (backend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-backend-results.sarif"

  # ============================================================
  # Etapa 4 — Build e Push da imagem Docker do Frontend
  # ============================================================
  build-frontend:
    name: "Build Frontend Docker Image"
    runs-on: ubuntu-latest
    needs: [prepare, ci-check]
    if: needs.prepare.outputs.should_deploy == 'true'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados Docker (frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=${{ needs.prepare.outputs.environment }}-latest
            type=sha,prefix=sha-

      - name: Build e push da imagem frontend
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            APP_VERSION=${{ needs.prepare.outputs.version }}
            VITE_API_BASE_URL=${{ needs.prepare.outputs.environment == 'production' && vars.PROD_API_URL || vars.STAGING_API_URL }}
            VITE_APP_ENV=${{ needs.prepare.outputs.environment }}

      - name: Verificar vulnerabilidades na imagem (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ needs.prepare.outputs.version }}
          format: "sarif"
          output: "trivy-frontend-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
        continue-on-error: false

      - name: Upload resultado Trivy (frontend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-frontend-results.sarif"

