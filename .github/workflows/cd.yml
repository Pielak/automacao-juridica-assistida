  # ============================================================
  rollback-production:
    name: "Rollback Produção (em caso de falha)"
    runs-on: ubuntu-latest
    needs: [prepare, deploy-production]
    if: failure() && needs.prepare.outputs.environment == 'production'
    environment:
      name: production
    steps:
      - name: Executar rollback
